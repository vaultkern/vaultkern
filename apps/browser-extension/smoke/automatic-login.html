<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automatic autofill authorization</title>
    <style>
      body { margin: 32px; font: 16px system-ui, sans-serif; }
      form { display: grid; gap: 12px; width: 360px; }
      label { display: grid; gap: 4px; }
      input { box-sizing: border-box; width: 100%; height: 40px; }
    </style>
  </head>
  <body>
    <form aria-label="Sign in" action="/session/login">
      <h1>Sign in</h1>
      <label>
        Username
        <input id="automatic-username" name="username" type="email" autocomplete="username" />
      </label>
      <label>
        Password
        <input
          id="automatic-password"
          name="password"
          type="password"
          autocomplete="current-password"
        />
      </label>
      <button type="submit">Sign in</button>
    </form>
    <img hidden alt="" src="/slow-smoke-resource" />
  </body>
</html>
