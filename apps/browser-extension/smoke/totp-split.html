<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern Split TOTP Smoke</title>
  </head>
  <body>
    <main>
      <h1>Two-factor verification</h1>
      <form id="vaultkern-smoke-totp-split-form" aria-label="Two-factor verification">
        <label for="vaultkern-smoke-totp-digit-1">Authenticator code</label>
        <input
          id="vaultkern-smoke-totp-digit-1"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_1"
          inputmode="numeric"
          maxlength="1"
        />
        <input
          id="vaultkern-smoke-totp-digit-2"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_2"
          inputmode="numeric"
          maxlength="1"
        />
        <input
          id="vaultkern-smoke-totp-digit-3"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_3"
          inputmode="numeric"
          maxlength="1"
        />
        <input
          id="vaultkern-smoke-totp-digit-4"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_4"
          inputmode="numeric"
          maxlength="1"
        />
        <input
          id="vaultkern-smoke-totp-digit-5"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_5"
          inputmode="numeric"
          maxlength="1"
        />
        <input
          id="vaultkern-smoke-totp-digit-6"
          class="vaultkern-smoke-totp-digit"
          name="otp_digit_6"
          inputmode="numeric"
          maxlength="1"
        />
      </form>
    </main>
  </body>
</html>
