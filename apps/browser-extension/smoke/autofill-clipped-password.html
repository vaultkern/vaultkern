<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autofill clipped password</title>
    <style>
      body { margin: 32px; }
      input {
        box-sizing: border-box;
        width: 280px;
        height: 40px;
        clip-path: circle(1px at 50% 50%);
      }
    </style>
  </head>
  <body>
    <input id="clipped-password" type="password" autocomplete="current-password" />
  </body>
</html>
