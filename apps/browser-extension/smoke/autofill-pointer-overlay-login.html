<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Covered automatic login</title>
    <style>
      body { margin: 32px; font: 16px system-ui, sans-serif; }
      .fixture { position: relative; width: 360px; }
      form { display: grid; gap: 12px; width: 360px; }
      label { display: grid; gap: 4px; }
      input { box-sizing: border-box; width: 100%; height: 40px; }
      .cover {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: white;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="fixture">
      <form aria-label="Sign in" action="/session/login">
        <h1>Sign in</h1>
        <label>
          Username
          <input id="covered-username" name="username" autocomplete="username" />
        </label>
        <label>
          Password
          <input
            id="covered-password"
            name="password"
            type="password"
            autocomplete="current-password"
          />
        </label>
        <button type="submit">Sign in</button>
      </form>
      <div id="pointer-events-cover" class="cover"></div>
    </div>
  </body>
</html>
