<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autofill label-covered password</title>
    <style>
      body { margin: 32px; }
      .field { position: relative; width: 280px; height: 40px; }
      input, label {
        position: absolute;
        inset: 0;
        box-sizing: border-box;
        width: 280px;
        height: 40px;
      }
      label {
        z-index: 1;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="field">
      <input id="label-covered-password" type="password" autocomplete="current-password" />
      <label id="password-cover" for="label-covered-password">Covered password</label>
    </div>
  </body>
</html>
