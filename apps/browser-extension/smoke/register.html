<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern Register Smoke</title>
  </head>
  <body>
    <main>
      <h1>Create account</h1>
      <form id="vaultkern-smoke-register-form">
        <label for="vaultkern-smoke-register-email">Email</label>
        <input
          id="vaultkern-smoke-register-email"
          name="email"
          type="email"
          autocomplete="username"
        />
        <label for="vaultkern-smoke-register-new-password">New password</label>
        <input
          id="vaultkern-smoke-register-new-password"
          name="new_password"
          type="password"
          autocomplete="new-password"
        />
        <label for="vaultkern-smoke-register-confirm-password">Confirm password</label>
        <input
          id="vaultkern-smoke-register-confirm-password"
          name="confirm_password"
          type="password"
          autocomplete="new-password"
        />
      </form>
    </main>
  </body>
</html>
