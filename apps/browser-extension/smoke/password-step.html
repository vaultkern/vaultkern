<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern Password Step Smoke</title>
  </head>
  <body>
    <form id="vaultkern-password-step-form">
      <label for="vaultkern-password-step-password">Password</label>
      <input
        id="vaultkern-password-step-password"
        name="password"
        type="password"
        autocomplete="current-password"
      />
      <button id="vaultkern-password-step-submit" type="submit">Sign in</button>
      <output id="vaultkern-password-step-result"></output>
    </form>
    <script>
      document
        .querySelector("#vaultkern-password-step-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          const password = document.querySelector("#vaultkern-password-step-password").value;
          document.querySelector("#vaultkern-password-step-result").value =
            `submitted:${password.length}`;
        });
    </script>
  </body>
</html>
