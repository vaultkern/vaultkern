<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern Change Password Smoke</title>
  </head>
  <body>
    <main>
      <h1>Change password</h1>
      <form id="vaultkern-smoke-change-password-form">
        <label for="vaultkern-smoke-change-current-password">Current password</label>
        <input
          id="vaultkern-smoke-change-current-password"
          name="current_password"
          type="password"
          autocomplete="current-password"
        />
        <label for="vaultkern-smoke-change-new-password">New password</label>
        <input
          id="vaultkern-smoke-change-new-password"
          name="new_password"
          type="password"
          autocomplete="new-password"
        />
        <label for="vaultkern-smoke-change-confirm-password">Confirm new password</label>
        <input
          id="vaultkern-smoke-change-confirm-password"
          name="confirm_new_password"
          type="password"
          autocomplete="new-password"
        />
      </form>
    </main>
  </body>
</html>
