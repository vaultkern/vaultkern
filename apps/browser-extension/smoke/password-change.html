<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern Password Change Smoke</title>
  </head>
  <body>
    <form id="vaultkern-password-change-form">
      <label for="vaultkern-old-password">Current password</label>
      <input id="vaultkern-old-password" name="current_password" type="password" />
      <label for="vaultkern-new-password">New password</label>
      <input id="vaultkern-new-password" name="new_password" type="password" />
      <label for="vaultkern-repeat-password">Repeat password</label>
      <input id="vaultkern-repeat-password" name="repeat_password" type="password" />
      <button id="vaultkern-password-change-submit" type="submit">Change password</button>
      <output id="vaultkern-password-change-result"></output>
    </form>
    <script>
      document
        .querySelector("#vaultkern-password-change-form")
        .addEventListener("submit", (event) => {
          event.preventDefault();
          const oldPassword = document.querySelector("#vaultkern-old-password").value;
          const newPassword = document.querySelector("#vaultkern-new-password").value;
          const repeatPassword = document.querySelector("#vaultkern-repeat-password").value;
          document.querySelector("#vaultkern-password-change-result").value =
            `submitted:${oldPassword.length}:${newPassword.length}:${repeatPassword.length}`;
        });
    </script>
  </body>
</html>
