<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultKern Browser Smoke Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7f9;
        color: #1f2933;
      }

      main {
        width: min(100% - 32px, 420px);
      }

      form {
        display: grid;
        gap: 16px;
        padding: 24px;
        border: 1px solid #d8dde6;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 32px rgb(31 41 51 / 0.08);
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.875rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #b8c2d1;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #275a9f;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      output {
        min-height: 1.5em;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <main>
      <form id="vaultkern-smoke-login-form" action="/login" method="post">
        <h1>VaultKern Smoke Login</h1>
        <label for="vaultkern-smoke-username">
          Username
          <input
            id="vaultkern-smoke-username"
            name="username"
            type="email"
            autocomplete="username"
            placeholder="alice@example.com"
          />
        </label>
        <label for="vaultkern-smoke-password">
          Password
          <input
            id="vaultkern-smoke-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="secret"
          />
        </label>
        <button id="vaultkern-smoke-submit" type="submit">Sign in</button>
        <output id="vaultkern-smoke-result" for="vaultkern-smoke-username vaultkern-smoke-password">
        </output>
      </form>
    </main>
    <script>
      const form = document.querySelector("#vaultkern-smoke-login-form");
      const username = document.querySelector("#vaultkern-smoke-username");
      const password = document.querySelector("#vaultkern-smoke-password");
      const result = document.querySelector("#vaultkern-smoke-result");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        result.value = `submitted:${username.value}:${password.value.length}`;
      });
    </script>
  </body>
</html>
