<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultKern Password Step Login Smoke</title>
  </head>
  <body>
    <main>
      <h1>Welcome back</h1>
      <form id="vaultkern-smoke-password-step-form" action="/login/password" method="post">
        <input type="hidden" name="username" value="alice@example.com" />
        <label for="vaultkern-smoke-password-step-password">
          Password
          <input
            id="vaultkern-smoke-password-step-password"
            name="password"
            type="password"
            autocomplete="current-password"
          />
        </label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
