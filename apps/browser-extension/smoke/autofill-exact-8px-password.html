<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autofill exact 8px password</title>
    <style>
      body { margin: 32px; }
      input { box-sizing: border-box; width: 8px; height: 8px; padding: 0; }
    </style>
  </head>
  <body>
    <input id="exact-8px-password" type="password" autocomplete="current-password" />
  </body>
</html>
