<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VaultKern TOTP Smoke</title>
  </head>
  <body>
    <main>
      <h1>Two-factor verification</h1>
      <form id="vaultkern-smoke-totp-form">
        <label for="vaultkern-smoke-totp">Authenticator code</label>
        <input
          id="vaultkern-smoke-totp"
          name="otp"
          inputmode="numeric"
          autocomplete="one-time-code"
        />
      </form>
    </main>
  </body>
</html>
