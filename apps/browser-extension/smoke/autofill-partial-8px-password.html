<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autofill partial 8px password</title>
    <style>
      body { margin: 32px; }
      .field { position: relative; width: 280px; height: 40px; }
      input { box-sizing: border-box; width: 280px; height: 40px; }
      input, .cover { position: absolute; inset: 0; }
      .cover { z-index: 1; background: white; }
      #right-cover { left: 8px; }
      #bottom-cover { top: 8px; right: auto; width: 8px; }
    </style>
  </head>
  <body>
    <div class="field">
      <input id="partial-8px-password" type="password" autocomplete="current-password" />
      <div id="right-cover" class="cover"></div>
      <div id="bottom-cover" class="cover"></div>
    </div>
  </body>
</html>
