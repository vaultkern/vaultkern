name: Android vertical slice

on:
  pull_request:
    paths:
      - "apps/android/**"
      - "crates/vaultkern-uniffi/**"
      - "tools/vaultkern-runtime/**"
      - ".github/workflows/android.yml"
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "crates/vaultkern-uniffi/**"
      - "tools/vaultkern-runtime/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  android-api-34:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: android-actions/setup-android@v3

      - name: Install Android 14 NDK and emulator image
        run: |
          sdkmanager "platforms;android-34" "ndk;26.3.11579264" \
            "system-images;android-34;google_apis;x86_64"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android,aarch64-linux-android

      - name: Test the shared UniFFI facade
        run: cargo test --locked -p vaultkern-uniffi -- --test-threads=1

      - name: Build Android UniFFI libraries
        run: |
          ndk_bin="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CC_x86_64_linux_android="$ndk_bin/x86_64-linux-android34-clang" \
          AR_x86_64_linux_android="$ndk_bin/llvm-ar" \
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="$ndk_bin/x86_64-linux-android34-clang" \
            cargo build --locked --release -p vaultkern-uniffi --target x86_64-linux-android
          CC_aarch64_linux_android="$ndk_bin/aarch64-linux-android34-clang" \
          AR_aarch64_linux_android="$ndk_bin/llvm-ar" \
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$ndk_bin/aarch64-linux-android34-clang" \
            cargo build --locked --release -p vaultkern-uniffi --target aarch64-linux-android
          install -Dm755 \
            target/x86_64-linux-android/release/libvaultkern_uniffi.so \
            apps/android/app/src/main/jniLibs/x86_64/libvaultkern_uniffi.so
          install -Dm755 \
            target/aarch64-linux-android/release/libvaultkern_uniffi.so \
            apps/android/app/src/main/jniLibs/arm64-v8a/libvaultkern_uniffi.so

      - name: JVM tests and APK assembly
        working-directory: apps/android
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug assembleRelease

      - name: API 34 instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          working-directory: apps/android
          script: ./gradlew --no-daemon connectedDebugAndroidTest
